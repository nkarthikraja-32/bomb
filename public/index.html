<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVENGE BOMBER | SECURE ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3e3e;
            --primary-glow: rgba(255, 62, 62, 0.4);
            --bg: #050505;
            --card-bg: #0f0f0f;
            --text: #ffffff;
            --text-dim: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, #1a1a1a 0%, transparent 100%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            position: relative;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 1;
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--primary));
            border-radius: 24px;
            z-index: -1;
            opacity: 0.2;
            transition: opacity 0.3s;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        h1 {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 8px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px var(--primary-glow);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .error-msg {
            color: var(--primary);
            font-size: 0.85rem;
            margin-top: 16px;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .decoration {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.1;
            z-index: 0;
            border-radius: 50%;
        }

        .dec-1 { top: -50px; left: -50px; }
        .dec-2 { bottom: -50px; right: -50px; }
    </style>
</head>
<body>
    <div class="decoration dec-1"></div>
    <div class="decoration dec-2"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo">💀</div>
            <h1>Access Control</h1>
            <p class="subtitle">Enter your secure passcode</p>
            
            <form id="loginForm">
                <div class="input-wrapper">
                    <input type="password" id="passcode" placeholder="••••" required autofocus>
                </div>
                <button type="submit">Authenticate</button>
                <div id="errorMsg" class="error-msg">Access Denied: Invalid Passcode</div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const passcodeField = document.getElementById('passcode');

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ passcode: passcodeField.value })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.style.display = 'block';
                    passcodeField.value = '';
                    passcodeField.focus();
                }
            } catch (err) {
                errorMsg.textContent = 'Connection Error. Please try again.';
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>
</html>
