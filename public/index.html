<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ACCESS | SECURE TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --bg: #0a0a0c;
            --card: #141417;
            --text: #e0e0e6;
            --dim: #70707a;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 32px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .header {
            margin-bottom: 40px;
            text-align: center;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .desc {
            font-size: 0.8rem;
            color: var(--dim);
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 6px;
            color: var(--accent);
            font-family: inherit;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        button {
            width: 100%;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 16px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 24px var(--accent-glow);
        }

        .error {
            color: #ff4444;
            font-size: 0.75rem;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="desc"><span class="status-dot"></span>SYSTEM_ONLINE</div>
                <h1>Terminal Access</h1>
                <div class="desc">VERIFICATION_REQUIRED</div>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="password" id="passcode" placeholder="SECURE_KEY" required autofocus>
                </div>
                <button type="submit">Initialize</button>
                <div id="errorMsg" class="error">INVALID_CREDENTIALS_ACCESS_DENIED</div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const passcodeField = document.getElementById('passcode');

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ passcode: passcodeField.value })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.style.display = 'block';
                    passcodeField.value = '';
                }
            } catch (err) {
                errorMsg.textContent = 'CONNECTION_ERROR_RETRY_LATER';
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>
</html>
