<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenge Bomber | Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0f17;
            font-family: 'Courier New', 'Fira Code', monospace;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: #11161f;
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid #ff1e3c;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 30, 60, 0.1);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #ff4d6d, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b949e;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            background: #0a0f1a;
            border: 1px solid #2d3a4e;
            padding: 14px 18px;
            border-radius: 14px;
            color: #f0f6fc;
            font-family: monospace;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 4px;
        }
        input:focus {
            outline: none;
            border-color: #ff1e3c;
            box-shadow: 0 0 10px rgba(255, 30, 60, 0.2);
        }
        button {
            width: 100%;
            background: #ff1e3c;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #ff4d6d;
            transform: scale(1.02);
        }
        .error {
            color: #ff5c5c;
            font-size: 0.8rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>💀 ACCESS REQUIRED</h1>
        <form id="loginForm">
            <div class="input-group">
                <label>Enter Passcode</label>
                <input type="password" id="passcode" placeholder="••••••••" required autofocus>
            </div>
            <button type="submit">UNLOCK SYSTEM</button>
            <div id="errorMsg" class="error">Invalid passcode. Access denied.</div>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const passcodeField = document.getElementById('passcode');

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ passcode: passcodeField.value })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.style.display = 'block';
                    passcodeField.value = '';
                    passcodeField.focus();
                }
            } catch (err) {
                errorMsg.textContent = 'System error. Try again later.';
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>
</html>
