<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL CENTER | DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.2);
            --bg: #0a0a0c;
            --card: #141417;
            --text: #e0e0e6;
            --dim: #70707a;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 20px 32px;
            background: var(--card);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand h1 {
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .logout-link {
            color: var(--danger);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 8px 16px;
            border: 1px solid var(--danger);
            border-radius: 4px;
            transition: all 0.2s;
        }

        .logout-link:hover {
            background: var(--danger);
            color: white;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .panel-header {
            font-size: 0.75rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-header::before {
            content: '';
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            margin-bottom: 8px;
            color: var(--dim);
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            background: var(--accent);
            color: var(--bg);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--dim);
            color: var(--dim);
        }

        .stats-box {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.15);
            padding: 16px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .stat-val {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-lbl {
            font-size: 0.6rem;
            color: var(--dim);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .console {
            height: 280px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            padding: 16px;
            font-size: 0.75rem;
            line-height: 1.6;
        }

        .log-line {
            margin-bottom: 4px;
            border-left: 2px solid transparent;
            padding-left: 8px;
        }

        .log-time { color: var(--dim); margin-right: 8px; }
        .log-info { border-color: var(--accent); }
        .log-error { border-color: var(--danger); color: var(--danger); }

        /* Admin Section */
        #adminView {
            display: none;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .data-list {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .list-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .list-row:last-child { border-bottom: none; }

        .del-action {
            color: var(--danger);
            cursor: pointer;
            font-size: 0.7rem;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <div style="width: 10px; height: 10px; background: var(--accent); border-radius: 2px;"></div>
                <h1>CORE_SYSTEM_DASHBOARD</h1>
            </div>
            <a href="/logout" class="logout-link">TERMINATE_SESSION</a>
        </header>

        <div class="layout">
            <div class="main">
                <div class="panel">
                    <div class="panel-header">EXECUTION_CONTROL</div>
                    <div class="field">
                        <label>Target Identifier (MSISDN)</label>
                        <input type="text" id="targetInput" placeholder="+91XXXXXXXXXX">
                    </div>
                    <div class="actions">
                        <button id="execBtn">Execute_Wave</button>
                        <button id="abortBtn" disabled>Abort_Process</button>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-header">SYSTEM_LOG_STREAM</div>
                    <div class="console" id="consoleOutput">
                        <div class="log-line">SYSTEM_INITIALIZED: WAITING_FOR_INPUT...</div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="panel-header">METRICS_ANALYSIS</div>
                    <div class="stats-box">
                        <div class="stat-card">
                            <div class="stat-val" id="valSuccess">0</div>
                            <div class="stat-lbl">Success</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val" id="valFailed">0</div>
                            <div class="stat-lbl">Failed</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val" id="valWaves">0</div>
                            <div class="stat-lbl">Cycles</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val" id="valTotal">0</div>
                            <div class="stat-lbl">Packets</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="adminView">
            <div class="panel-header" style="margin-bottom: 24px; font-weight: 700; color: var(--accent);">ADMIN_PRIVILEGED_TERMINAL</div>
            <div class="admin-grid">
                <div class="panel">
                    <div class="panel-header">ACCESS_CREDENTIALS_MANAGEMENT</div>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="newKeyInput" placeholder="NEW_KEY">
                        <button id="addKeyBtn" style="flex: 0 0 80px;">ADD</button>
                    </div>
                    <div class="data-list" id="keyList"></div>
                </div>

                <div class="panel">
                    <div class="panel-header">RESTRICTED_IDENTIFIERS_LIST</div>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="banInput" placeholder="BAN_TARGET">
                        <button id="addBanBtn" style="flex: 0 0 80px;">BAN</button>
                    </div>
                    <div class="data-list" id="banList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let active = false;
        let waves = 0;
        let success = 0;
        let failed = 0;
        let total = 0;
        let cycleTimer = null;

        const writeLog = (text, type = 'info') => {
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            line.innerHTML = `<span class="log-time">[${time}]</span> ${text.toUpperCase()}`;
            const out = document.getElementById('consoleOutput');
            out.prepend(line);
        };

        const refreshMetrics = () => {
            document.getElementById('valSuccess').innerText = success;
            document.getElementById('valFailed').innerText = failed;
            document.getElementById('valWaves').innerText = waves;
            document.getElementById('valTotal').innerText = total;
        };

        const executeSequence = async () => {
            const phone = document.getElementById('targetInput').value.trim();
            if (!phone) return;

            active = true;
            document.getElementById('execBtn').disabled = true;
            document.getElementById('abortBtn').disabled = false;
            
            writeLog(`WAVE_START: TARGETING_${phone}`, 'info');
            
            const runCycle = async () => {
                if (!active) return;
                waves++;
                try {
                    const res = await fetch('/api/bomb', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        success += data.successCount;
                        failed += (data.total - data.successCount);
                        total += data.total;
                        writeLog(`WAVE_${waves}_COMPLETE: ${data.successCount}/${data.total}_REQUESTS_SUCCESS`);
                    } else {
                        writeLog(`CRITICAL_ERROR: ${data.error}`, 'error');
                        abortProcess();
                    }
                } catch (e) {
                    writeLog(`CONNECTION_LOST: RETRYING_NEXT_CYCLE`, 'error');
                }
                refreshMetrics();
                if (active) cycleTimer = setTimeout(runCycle, 30000);
            };

            runCycle();
        };

        const abortProcess = () => {
            active = false;
            clearTimeout(cycleTimer);
            document.getElementById('execBtn').disabled = false;
            document.getElementById('abortBtn').disabled = true;
            writeLog('PROCESS_ABORTED_BY_OPERATOR', 'error');
        };

        document.getElementById('execBtn').onclick = executeSequence;
        document.getElementById('abortBtn').onclick = abortProcess;

        // Admin Functionality
        const initAdmin = async () => {
            try {
                const res = await fetch('/api/admin/status');
                const data = await res.json();
                if (data.isAdmin) {
                    document.getElementById('adminView').style.display = 'block';
                    loadAdminData();
                }
            } catch (e) {}
        };

        const loadAdminData = async () => {
            try {
                const res = await fetch('/api/admin/data');
                if (!res.ok) return;
                const data = await res.json();
                
                const kList = document.getElementById('keyList');
                kList.innerHTML = '';
                data.codes.forEach(c => {
                    const row = document.createElement('div');
                    row.className = 'list-row';
                    row.innerHTML = `<span>${c}</span> ${c !== 'jaya1987' ? `<span class="del-action" onclick="deleteKey('${c}')">REVOKE</span>` : '<span style="color:var(--dim)">MASTER</span>'}`;
                    kList.appendChild(row);
                });

                const bList = document.getElementById('banList');
                bList.innerHTML = '';
                data.blacklist.forEach(p => {
                    const row = document.createElement('div');
                    row.className = 'list-row';
                    row.innerHTML = `<span>${p}</span> <span class="del-action" onclick="unbanTarget('${p}')">RELEASE</span>`;
                    bList.appendChild(row);
                });
            } catch (e) {}
        };

        window.deleteKey = async (code) => {
            await fetch('/api/admin/remove-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            loadAdminData();
        };

        window.unbanTarget = async (phone) => {
            await fetch('/api/admin/unblacklist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            loadAdminData();
        };

        document.getElementById('addKeyBtn').onclick = async () => {
            const code = document.getElementById('newKeyInput').value;
            if (!code) return;
            await fetch('/api/admin/add-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            document.getElementById('newKeyInput').value = '';
            loadAdminData();
        };

        document.getElementById('addBanBtn').onclick = async () => {
            const phone = document.getElementById('banInput').value;
            if (!phone) return;
            await fetch('/api/admin/blacklist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            document.getElementById('banInput').value = '';
            loadAdminData();
        };

        initAdmin();
    </script>
</body>
</html>
