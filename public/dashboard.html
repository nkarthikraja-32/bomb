<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVENGE BOMBER | DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3e3e;
            --primary-glow: rgba(255, 62, 62, 0.2);
            --bg: #050505;
            --card-bg: #0f0f0f;
            --text: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.1);
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-section h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logout-btn {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 8px 20px;
            border: 1px solid var(--primary);
            border-radius: 10px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--primary);
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: var(--text-dim);
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 5px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .log-container {
            height: 300px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .log-entry {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .log-time { color: var(--text-dim); margin-right: 10px; }
        .log-success { color: var(--success); }
        .log-error { color: var(--primary); }

        /* Admin Section */
        #adminPanel {
            display: none;
            margin-top: 40px;
            border-top: 2px dashed var(--border);
            padding-top: 40px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .list-container {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .remove-btn {
            color: var(--primary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <span style="font-size: 1.5rem;">💀</span>
                <h1>Revenge Bomber</h1>
            </div>
            <a href="/logout" class="logout-btn">Logout</a>
        </header>

        <div class="grid">
            <div class="main-col">
                <div class="card">
                    <div class="card-title">🚀 Bombing Control</div>
                    <div class="input-group">
                        <label>Target Phone Number</label>
                        <input type="text" id="phoneInput" placeholder="+91XXXXXXXXXX">
                    </div>
                    <div class="btn-group">
                        <button id="startBtn" class="btn-primary">Start Attack</button>
                        <button id="stopBtn" class="btn-secondary" disabled>Stop</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">📜 Activity Log</div>
                    <div class="log-container" id="log">
                        <div class="log-entry">System ready. Waiting for target...</div>
                    </div>
                </div>
            </div>

            <div class="side-col">
                <div class="card">
                    <div class="card-title">📊 Live Stats</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">Success</div>
                            <div class="stat-value" id="statSuccess">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Failed</div>
                            <div class="stat-value" id="statFailed">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Waves</div>
                            <div class="stat-value" id="statWaves">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Total</div>
                            <div class="stat-value" id="statTotal">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="adminPanel">
            <h2 style="margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase;">🛡️ Admin Terminal (jaya1987)</h2>
            <div class="admin-grid">
                <div class="card">
                    <div class="card-title">🔑 Manage Access Codes</div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="newCode" placeholder="New Access Code">
                        <button id="addCodeBtn" class="btn-primary" style="flex: 0 0 80px;">Add</button>
                    </div>
                    <div class="list-container" id="codeList"></div>
                </div>

                <div class="card">
                    <div class="card-title">🚫 Blacklist System</div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="blackPhone" placeholder="Phone to Protect">
                        <button id="addBlackBtn" class="btn-primary" style="flex: 0 0 80px;">Ban</button>
                    </div>
                    <div class="list-container" id="blackList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isBombing = false;
        let waveCount = 0;
        let successCount = 0;
        let failedCount = 0;
        let totalSent = 0;
        let timer = null;

        const log = (msg, type = '') => {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type ? 'log-' + type : ''}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            const logEl = document.getElementById('log');
            logEl.prepend(entry);
        };

        const updateStats = () => {
            document.getElementById('statSuccess').innerText = successCount;
            document.getElementById('statFailed').innerText = failedCount;
            document.getElementById('statWaves').innerText = waveCount;
            document.getElementById('statTotal').innerText = totalSent;
        };

        const startAttack = async () => {
            const phone = document.getElementById('phoneInput').value;
            if (!phone) return alert('Enter a phone number');

            isBombing = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            log(`Initiating attack on ${phone}...`, 'success');
            
            const runWave = async () => {
                if (!isBombing) return;
                waveCount++;
                try {
                    const res = await fetch('/api/bomb', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        successCount += data.successCount;
                        failedCount += (data.total - data.successCount);
                        totalSent += data.total;
                        log(`Wave ${waveCount} complete: ${data.successCount} sent successfully.`);
                    } else {
                        log(`Error: ${data.error}`, 'error');
                        stopAttack();
                    }
                } catch (e) {
                    log(`Connection error during wave ${waveCount}`, 'error');
                }
                updateStats();
                if (isBombing) timer = setTimeout(runWave, 30000);
            };

            runWave();
        };

        const stopAttack = () => {
            isBombing = false;
            clearTimeout(timer);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            log('Attack terminated by user.');
        };

        document.getElementById('startBtn').onclick = startAttack;
        document.getElementById('stopBtn').onclick = stopAttack;

        // Admin Logic
        const checkAdmin = async () => {
            const res = await fetch('/api/admin/status');
            const data = await res.json();
            if (data.isAdmin) {
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminData();
            }
        };

        const loadAdminData = async () => {
            const res = await fetch('/api/admin/data');
            const data = await res.json();
            
            const codeList = document.getElementById('codeList');
            codeList.innerHTML = '';
            data.codes.forEach(c => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `<span>${c}</span> ${c !== 'jaya1987' ? `<span class="remove-btn" onclick="removeCode('${c}')">Remove</span>` : '<span style="font-size:0.7rem; color:var(--text-dim)">ADMIN</span>'}`;
                codeList.appendChild(item);
            });

            const blackList = document.getElementById('blackList');
            blackList.innerHTML = '';
            data.blacklist.forEach(p => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `<span>${p}</span> <span class="remove-btn" onclick="unblacklist('${p}')">Unban</span>`;
                blackList.appendChild(item);
            });
        };

        const addCode = async () => {
            const code = document.getElementById('newCode').value;
            if (!code) return;
            await fetch('/api/admin/add-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            document.getElementById('newCode').value = '';
            loadAdminData();
        };

        const removeCode = async (code) => {
            await fetch('/api/admin/remove-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            loadAdminData();
        };

        const addBlacklist = async () => {
            const phone = document.getElementById('blackPhone').value;
            if (!phone) return;
            await fetch('/api/admin/blacklist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            document.getElementById('blackPhone').value = '';
            loadAdminData();
        };

        const unblacklist = async (phone) => {
            await fetch('/api/admin/unblacklist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            loadAdminData();
        };

        document.getElementById('addCodeBtn').onclick = addCode;
        document.getElementById('addBlackBtn').onclick = addBlacklist;

        checkAdmin();
    </script>
</body>
</html>
